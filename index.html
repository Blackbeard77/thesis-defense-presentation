<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thesis Defense – Ashraf Lehawany</title>

  <!-- Reveal.js CSS -->
  <link rel="stylesheet" href="node_modules/reveal.js/dist/reveal.css" />
  <link rel="stylesheet" href="node_modules/reveal.js/dist/theme/black.css" />

  <!-- Your custom styles (always AFTER reveal, so yours win) -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Reveal.js syntax highlight theme (for code blocks) -->
  <!-- <link rel="stylesheet" href="node_modules/reveal.js/plugin/highlight/monokai.css" /> -->
</head>

<body>

<div class="reveal">
  <div class="slides" id="slide-container">
    <!-- ✅ Slides are loaded automatically below — do not add anything here -->
  </div>
</div>

<!-- Reveal.js core -->
<script src="node_modules/reveal.js/dist/reveal.js"></script>

<script>
  // ── CHAPTER FILES ──────────────────────────────────────
  // Add or remove files here to control what's in the deck.
  // Order matters — they appear in this exact sequence.
  const chapters = [
    'slides/00-title.html',
    'slides/01-agenda.html',
    'slides/02-introduction.html',
    'slides/03-background.html',
    'slides/04-method.html',
    'slides/05-results.html',
    'slides/06-discussion.html',
    'slides/07-conclusion.html',
    'slides/08-qa.html',
  ];

  // ── LOADER ────────────────────────────────────────────
  // Fetches each chapter file and injects it into the deck,
  // then initializes Reveal.js once everything is loaded.
  async function loadSlides() {
    const container = document.getElementById('slide-container');

    for (const file of chapters) {
      try {
        const res  = await fetch(file);
        const html = await res.text();
        container.insertAdjacentHTML('beforeend', html);
      } catch (err) {
        console.warn(`Could not load: ${file}`, err);
      }
    }

    // ── REVEAL CONFIG ────────────────────────────────────
    Reveal.initialize({
      // Navigation
      hash:           true,   // URL updates per slide (bookmarkable)
      history:        true,   // browser back/forward works

      // Layout
      width:          1280,
      height:         720,
      margin:         0.04,
      minScale:       0.2,
      maxScale:       2.0,

      // Transitions
      transition:           'fade',   // none | fade | slide | convex | zoom
      transitionSpeed:      'default',
      backgroundTransition: 'fade',

      // Controls & UI
      controls:       true,
      controlsLayout: 'bottom-right',
      progress:       true,
      slideNumber:    'c/t',          // shows "3 / 24" style
      showSlideNumber:'all',

      // Fragments (the "appear one by one" effect)
      fragments:      true,

      // Plugins
      plugins: []
    });

    // ── ANIMATE BAR CHARTS ───────────────────────────────
    // Runs after Reveal is ready — triggers bar fill animations
    // when a results slide becomes visible.
    Reveal.on('slidechanged', animateBars);
    Reveal.on('ready',        animateBars);

    function animateBars() {
      const current = Reveal.getCurrentSlide();
      if (!current) return;
      current.querySelectorAll('.bar-fill[data-width]').forEach(bar => {
        // Small delay so the transition is visible
        setTimeout(() => {
          bar.style.width = bar.dataset.width;
        }, 200);
      });
    }
  }

  loadSlides();
</script>

</body>
</html>
